        <!-- 线上数据编辑模态框 -->
        <div v-if="showOnlineDataEditModal" class="fixed inset-0 z-50 flex items-center justify-center modal-overlay">
            <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4">
                <div class="p-4 border-b flex justify-between items-center">
                    <h3 class="text-lg font-semibold">编辑线上数据</h3>
                    <button @click="showOnlineDataEditModal = false" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form @submit.prevent="saveOnlineDataEdit" class="p-4 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">酒店名称</label>
                            <input v-model="onlineDataEditForm.hotel_name" type="text" class="w-full px-3 py-2 border rounded-lg bg-gray-50" readonly="">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">酒店ID</label>
                            <input v-model="onlineDataEditForm.hotel_id" type="text" class="w-full px-3 py-2 border rounded-lg bg-gray-50" readonly="">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">数据日期</label>
                        <input v-model="onlineDataEditForm.data_date" type="date" class="w-full px-3 py-2 border rounded-lg bg-gray-50" readonly="">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">销售额 (元)</label>
                            <input v-model.number="onlineDataEditForm.amount" type="number" step="0.01" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">间夜量</label>
                            <input v-model.number="onlineDataEditForm.quantity" type="number" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">预订订单数</label>
                            <input v-model.number="onlineDataEditForm.book_order_num" type="number" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">携程点评分</label>
                            <input v-model.number="onlineDataEditForm.comment_score" type="number" step="0.1" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">去哪儿点评分</label>
                            <input v-model.number="onlineDataEditForm.qunar_comment_score" type="number" step="0.1" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="flex justify-end space-x-3 pt-4">
                        <button type="button" @click="showOnlineDataEditModal = false" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                            <i class="fas fa-save mr-2"></i>保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
