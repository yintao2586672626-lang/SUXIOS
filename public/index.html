    <script>
        (() => {
            const loginBackgroundPreload = 'images/login-hotel-lobby-bg.avif';
            const readStartupAuthToken = () => {
                try {
                    const sessionToken = sessionStorage.getItem('token') || '';
                    if (sessionToken) return sessionToken;
                    const legacyToken = localStorage.getItem('token') || '';
                    if (legacyToken) {
                        sessionStorage.setItem('token', legacyToken);
                        localStorage.removeItem('token');
                        return legacyToken;
                    }
                } catch (error) {
                    return '';
                }
                return '';
            };
            const shouldPreloadLoginBackground = () => {
                try {
                    return !readStartupAuthToken() || !localStorage.getItem('suxios_auth_user_cache_v1');
                } catch (error) {
                    return true;
                }
            };
            const preloadLoginBackground = () => {
                if (!shouldPreloadLoginBackground() || document.querySelector('link[data-suxi-login-bg-preload="1"]')) return;
                const link = document.createElement('link');
                link.rel = 'preload';
                link.href = loginBackgroundPreload;
                link.as = 'image';
                link.type = 'image/avif';
                link.setAttribute('fetchpriority', 'high');
                link.dataset.suxiLoginBgPreload = '1';
                document.head.appendChild(link);
            };
            preloadLoginBackground();
        })();
    </script>
    <link href="tailwind.min.css?v=20260714-ota-config-workbench-hb28035c064" rel="stylesheet">

    <script>
        (() => {
            const fontAwesomeStylesheet = 'font-awesome.min.css?v=20260628-static-router-fix';
            const loadFontAwesomeStylesheet = () => {
                if (document.querySelector('link[data-suxi-fontawesome="1"]')) return;
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = fontAwesomeStylesheet;
                link.dataset.suxiFontawesome = '1';
                document.head.appendChild(link);
            };
            const scheduleFontAwesomeStylesheetLoad = () => {
                const run = () => window.setTimeout(loadFontAwesomeStylesheet, 1600);
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', run, { once: true });
                    return;
                }
                run();
            };
            scheduleFontAwesomeStylesheetLoad();
        })();
    </script>
    <script>
        (() => {
            const escapeAssetErrorText = (value) => String(value || '').replace(/[<>&"']/g, (char) => ({
                '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;',
            }[char]));
            window.SUXI_RENDER_ASSET_LOAD_ERROR = (assetName) => {
                const render = () => {
                    const appRoot = document.getElementById('app');
                    if (!appRoot || appRoot.dataset.assetErrorRendered === '1') return;
                    appRoot.dataset.assetErrorRendered = '1';
                    appRoot.removeAttribute('v-cloak');
                    const asset = escapeAssetErrorText(assetName || 'unknown asset');
                    appRoot.innerHTML = `<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6"><div class="max-w-xl w-full bg-white border border-red-200 rounded-xl shadow-sm p-6"><div class="text-lg font-semibold text-red-700 mb-2">项目资源加载失败</div><div class="text-sm text-gray-600 mb-4">关键前端资源未能加载，请刷新页面；如果仍失败，请保留下面资源名称。</div><pre class="text-xs whitespace-pre-wrap break-words bg-red-50 text-red-700 border border-red-100 rounded p-3">${asset}</pre></div></div>`;
                };
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', render, { once: true });
                    return;
                }
                render();
            };
        })();
    </script>
