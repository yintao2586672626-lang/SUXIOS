<script>
    const layout = <?php echo json_encode($layout, JSON_UNESCAPED_UNICODE); ?>;
    const metrics = <?php echo json_encode($metrics, JSON_UNESCAPED_UNICODE); ?>;
    const grid = document.getElementById('compass-grid');

    function applyLayout() {
        const blocks = Array.from(grid.querySelectorAll('[data-block-key]'));
        const order = layout.order || [];
        blocks.sort((a, b) => order.indexOf(a.dataset.blockKey) - order.indexOf(b.dataset.blockKey));
        blocks.forEach(block => {
            block.style.display = layout.hidden && layout.hidden.includes(block.dataset.blockKey) ? 'none' : '';
            grid.appendChild(block);
        });
        renderLayoutList();
    }

    function moveBlock(key, direction) {
        const order = layout.order;
        const idx = order.indexOf(key);
        if (idx === -1) return;
        const newIdx = direction === 'up' ? idx - 1 : idx + 1;
        if (newIdx < 0 || newIdx >= order.length) return;
        [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
        applyLayout();
    }

    function toggleHidden(key) {
        layout.hidden = layout.hidden || [];
        if (layout.hidden.includes(key)) {
            layout.hidden = layout.hidden.filter(k => k !== key);
        } else {
            layout.hidden.push(key);
        }
        applyLayout();
    }

    function initLayoutControls() {
        grid.querySelectorAll('[data-block-key]').forEach(block => {
            const key = block.dataset.blockKey;
            block.querySelector('.move-up').addEventListener('click', () => moveBlock(key, 'up'));
            block.querySelector('.move-down').addEventListener('click', () => moveBlock(key, 'down'));
            block.querySelector('.toggle-hide').addEventListener('click', () => toggleHidden(key));
        });
    }

    function renderLayoutList() {
        const labels = {
            weather: '天气预报',
            todo: '今日待办事宜',
            metrics: '数据展示',
            alerts: '今日线上数据预警',
            holiday: '下个收益期单量显示'
        };
        const container = document.getElementById('layout-list');
        container.innerHTML = '';
        layout.order.forEach(key => {
            const item = document.createElement('div');
            item.className = 'flex items-center justify-between bg-slate-900/40 border border-slate-800 rounded-lg px-3 py-2 text-sm';
            item.innerHTML = `
                <div class="flex items-center gap-2">
                    <input type="checkbox" ${layout.hidden.includes(key) ? '' : 'checked'} data-key="${key}" class="layout-toggle">
                    <span>${labels[key] || key}</span>
                </div>
                <div class="space-x-1">
                    <button class="layout-btn layout-up" data-key="${key}">上移</button>
                    <button class="layout-btn layout-down" data-key="${key}">下移</button>
                </div>
            `;
            container.appendChild(item);
        });
        container.querySelectorAll('.layout-toggle').forEach(el => {
            el.addEventListener('change', () => toggleHidden(el.dataset.key));
        });
        container.querySelectorAll('.layout-up').forEach(el => {
            el.addEventListener('click', () => moveBlock(el.dataset.key, 'up'));
        });
        container.querySelectorAll('.layout-down').forEach(el => {
            el.addEventListener('click', () => moveBlock(el.dataset.key, 'down'));
        });
    }

    function renderMetrics(tab) {
        const data = metrics[tab] || metrics.day;
        document.querySelectorAll('[data-metric]').forEach(el => {
            const key = el.dataset.metric;
            el.textContent = key === 'revenue' ? ('¥' + data[key]) : data[key];
        });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMetrics(btn.dataset.tab);
        });
    });

    document.getElementById('toggle-layout').addEventListener('click', () => {
        document.getElementById('layout-panel').classList.toggle('hidden');
    });

    document.getElementById('save-layout').addEventListener('click', async () => {
        const token = new URLSearchParams(location.search).get('token') || localStorage.getItem('token') || '';
        const url = token ? `/compass/save-layout?token=${encodeURIComponent(token)}` : '/compass/save-layout';
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': token },
            body: JSON.stringify({ order: layout.order, hidden: layout.hidden || [] })
        });
        const data = await res.json().catch(() => ({}));
        alert(data.message || '已保存');
    });

    applyLayout();
    initLayoutControls();
    renderLayoutList();
    renderMetrics('day');
</script>
