<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店OS - 测试页</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 48px; margin-bottom: 20px; }
        p { font-size: 18px; }
        .success { color: #4ade80; }
        .time { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>酒店OS</h1>
        <p class="success">服务器正常！中文字符显示正常。</p>
        <p>当前时间：<span class="time" id="time"></span></p>
        <p>如果看到这个页面，说明Apache和PHP工作正常。</p>
        <p style="margin-top:20px; color:#ccc;">请清除浏览器缓存后再访问首页。</p>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
