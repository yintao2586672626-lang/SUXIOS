<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Sanitized Ctrip Visible Evidence Fixture</title>
  </head>
  <body>
    <main data-source="sanitized-ctrip-fixture">
      <section data-page="flowdata">
        <article data-ota-evidence="traffic-rank">
          <span data-field="label">流量排名</span>
          <strong data-field="value">同商圈第 12 名</strong>
          <p data-field="tip">近 7 天曝光转化排名，仅作页面可见证据。</p>
        </article>
        <article data-ota-evidence="pricing-tip">
          <span data-field="label">价格提示</span>
          <strong data-field="value">本周末建议关注高峰价差</strong>
          <p data-field="tip">页面提示文案来自脱敏 fixture，不代表接口指标。</p>
        </article>
        <article data-ota-evidence="supply-label">
          <span data-field="label">房态标签</span>
          <strong data-field="value">库存偏紧</strong>
        </article>
      </section>
    </main>
  </body>
</html>
