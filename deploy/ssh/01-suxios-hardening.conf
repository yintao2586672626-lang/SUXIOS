# SUXIOS Tencent Cloud SSH baseline.
# This file loads before Ubuntu's 50-cloud-init.conf because sshd uses the
# first value encountered for each setting.
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin no
PermitEmptyPasswords no
MaxAuthTries 3
LoginGraceTime 30
X11Forwarding no
