name: PHP Composer

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: suxi-ci-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, openssl
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Audit PHP dependencies
        run: composer audit --no-interaction

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install MySQL-compatible client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Audit Node dependencies
        run: npm audit --audit-level=moderate

      - name: Verify fresh database, repeatable migration, and 8-way concurrency
        timeout-minutes: 10
        env:
          SUXI_CI_MYSQL_VERIFY: '1'
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_USER: root
          DB_PASS: suxi-ci-root
          MYSQL_BINARY: mariadb
          PHP_BINARY: php
        run: npm run verify:mysql-fresh-concurrency

      - name: Verify historical tenant remap on MariaDB 10.11
        timeout-minutes: 5
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_USER: root
          DB_PASS: suxi-ci-root
          MYSQL_BINARY: mariadb
        run: node scripts/verify_tenant_history_migration_mariadb.mjs

      - name: Run backend tests
        run: composer test

      - name: Run Node automation tests
        timeout-minutes: 10
        env:
          PHP_BINARY: php
        run: npm run test:node

      - name: Run project guards
        run: npm run verify:p0-guards

      - name: Run structural contract checks (not release approval)
        run: |
          php scripts/verify_missing_modules.php
          php scripts/verify_route_coverage.php
          node scripts/verify_ai_model_config_i18n.mjs
          npm run verify:ota-data-batch
          npm run verify:opening-batch-actions
          npm run review:functional-readiness
          npm run review:release-issues
          npm run verify:release-evidence-intake
          npm run verify:release-readiness-contract
          npm run review:non-security
          npm run review:report-security-finance
          npm run verify:release-status
